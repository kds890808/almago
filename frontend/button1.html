<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>버튼1 페이지</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f2f3f7;
    font-family:'Pretendard', sans-serif;
}

.page-wrap{
    max-width:500px;
    margin:auto;
}

.top-card{
    background:linear-gradient(135deg,#2f66ff,#1842c7);
    color:white;

    border-radius:24px;

    padding:30px 20px;

    box-shadow:0 8px 25px rgba(0,0,0,0.12);

    margin-bottom:20px;
}

.top-title{
    font-size:30px;
    font-weight:800;
    margin-bottom:10px;
}

.top-desc{
    font-size:15px;
    opacity:0.9;
    line-height:1.5;
}

.content-card{
    background:white;
    border-radius:20px;
    padding:20px;

    margin-bottom:16px;

    box-shadow:0 4px 15px rgba(0,0,0,0.06);
}

.content-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:12px;
    color:#1842c7;
}

.content-text{
    font-size:15px;
    color:#444;
    line-height:1.6;
}

.main-btn{
    display:block;

    width:100%;

    background:#1842c7;
    color:white;

    border:none;
    border-radius:14px;

    padding:16px;

    font-size:16px;
    font-weight:700;

    cursor:pointer;

    margin-top:20px;
}

.main-btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="page-wrap">

    <div class="top-card">

        <div class="top-title">
            🎯 버튼1 페이지
        </div>

        <div class="top-desc">
            관리자에서 연결한 샘플 페이지입니다.
            자유롭게 내용을 추가할 수 있습니다.
        </div>

    </div>

    <div class="content-card">

        <div class="content-title">
            오늘의 추천
        </div>

        <div class="content-text">
            이 영역에는 분석 내용,
            공지사항,
            추천 픽,
            이미지 등을 자유롭게 넣을 수 있습니다.
        </div>

        <button class="main-btn">
            분석 보러가기
        </button>

    </div>

    <div class="content-card">

        <div class="content-title">
            추가 영역
        </div>

        <div class="content-text">
            HTML로 원하는 구조를 계속 확장하면 됩니다.
        </div>

    </div>

</div>

</body>
</html>
