<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>경마속보</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
Pretendard,
sans-serif;

background:#f5f7fb;

color:#1e293b;

}

.container{

max-width:700px;

margin:auto;

padding:25px 18px 40px;

}

.header{

text-align:center;

margin-bottom:25px;

}

.header h1{

font-size:32px;

font-weight:900;

margin-bottom:10px;

}

.header p{

color:#64748b;

font-size:15px;

line-height:1.6;

}

.news-card{

background:white;

border-radius:22px;

padding:22px;

margin-bottom:18px;

display:flex;

align-items:center;

justify-content:space-between;

box-shadow:
0 8px 20px rgba(0,0,0,.05);

cursor:pointer;

transition:.25s;

}

.news-card:hover{

transform:translateY(-3px);

}

.left{

display:flex;

align-items:center;

gap:18px;

}

.icon{

width:62px;

height:62px;

border-radius:18px;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

color:white;

font-weight:bold;

}

.seoul .icon{

background:
linear-gradient(
135deg,
#2563eb,
#60a5fa
);

}

.busan .icon{

background:
linear-gradient(
135deg,
#16a34a,
#4ade80
);

}

.jeju .icon{

background:
linear-gradient(
135deg,
#f59e0b,
#fbbf24
);

}

.title{

font-size:24px;

font-weight:900;

margin-bottom:6px;

}

.sub{

font-size:14px;

color:#64748b;

}

.arrow{

font-size:26px;

color:#94a3b8;

}

.back-btn{

width:100%;

margin-top:20px;

padding:16px;

border:none;

border-radius:16px;

background:#1e3a8a;

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>📰 경마속보</h1>

<p>
서울 · 부산 · 제주의<br>
실시간 속보와 공지사항을 확인하세요.
</p>

</div>

<div
class="news-card seoul"
onclick="goSeoul()"
>

<div class="left">

<div class="icon">
🏇
</div>

<div>

<div class="title">
서울경마
</div>

<div class="sub">
출전취소 · 기수변경 · 공지사항
</div>

</div>

</div>

<div class="arrow">
›
</div>

</div>

<div
class="news-card busan"
onclick="goBusan()"
>

<div class="left">

<div class="icon">
🏇
</div>

<div>

<div class="title">
부산경마
</div>

<div class="sub">
출전취소 · 기수변경 · 공지사항
</div>

</div>

</div>

<div class="arrow">
›
</div>

</div>

<div
class="news-card jeju"
onclick="goJeju()"
>

<div class="left">

<div class="icon">
🏇
</div>

<div>

<div class="title">
제주경마
</div>

<div class="sub">
출전취소 · 기수변경 · 공지사항
</div>

</div>

</div>

<div class="arrow">
›
</div>

</div>

<button
class="back-btn"
onclick="history.back()"
>
← 홈으로 돌아가기
</button>

</div>

<script>

function goSeoul(){

window.open(
"https://race.kra.co.kr/raceFastreport/ChulmapyoChange.do?Act=03&Sub=1&meet=1",
"_blank"
);

}

function goBusan(){

window.open(
"https://race.kra.co.kr/raceScore/ScoretableScoreList.do?Act=04&Sub=1&meet=3",
"_blank"
);

}

function goJeju(){

window.open(
"https://race.kra.co.kr/raceFastreport/ChulmapyoChange.do?Act=03&Sub=1&meet=2",
"_blank"
);

}

</script>

</body>

</html>
