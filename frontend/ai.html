async function unlockPedigree(
region,
raceNo
){

    if(
        !confirm(
            "200P 사용 후 혈통분석을 열겠습니까?"
        )
    ){
        return;
    }

    const token =
    localStorage.getItem(
        "token"
    );

    const res =
    await fetch(
        "/use-blood-analysis",
        {
            method:"POST",
            headers:{
                "Authorization":
                `Bearer ${token}`
            }
        }
    );

    const data =
    await res.json();

    if(!res.ok){

        alert(
            data.detail ||
            "포인트 부족"
        );

        return;
    }

    alert(
        `차감 완료\n잔여포인트 : ${data.remain_point}P`
    );

    document.getElementById(
        `pedigree-${region}-${raceNo}`
    ).style.display = "block";

}

async function unlockPace(
region,
raceNo
){

    if(
        !confirm(
            "200P 사용 후 전개분석을 열겠습니까?"
        )
    ){
        return;
    }

    alert(
        "여기서 포인트 차감 + 전개분석 표시"
    );

}

async function unlockFinal(
    region,
    raceNo
){

    if(
        !confirm(
            "300P 사용 후 종합분석을 열겠습니까?"
        )
    ){
        return;
    }

    const token =
    localStorage.getItem(
        "token"
    );

    const res =
    await fetch(
        "/use-final-analysis",
        {
            method:"POST",
            headers:{
                "Authorization":
                `Bearer ${token}`
            }
        }
    );

    const data =
    await res.json();

    if(!res.ok){

        alert(
            data.detail ||
            "포인트 부족"
        );

        return;
    }

    alert(
        `차감 완료\n잔여포인트 : ${data.remain_point}P`
    );

    const target =
    document.getElementById(
        `final-analysis-${region}-${raceNo}`
    );

    if(target){
        target.style.display =
        "block";
    }

}
