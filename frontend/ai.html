.forEach(el=>{

    const token =
    localStorage.getItem(
        "token"
    );

    if(!token){
        return;
    }

    const res =
    await fetch(
        "/my-info",
        {
            headers:{
                Authorization:
                `Bearer ${token}`
            }
        }
    );

    const user =
    await res.json();

    ).innerHTML =
    `👤 ${user.name}님`;

    document.getElementById(
    "user-point"
    ).innerHTML =
    `💰 ${user.point}P`;

function showModal(
title,
message,
icon="📌"
){

    return new Promise(resolve=>{

        modalResolve = resolve;

        document.getElementById(
        "modal-title"
        ).innerHTML = title;

        document.getElementById(
        "modal-message"
        ).innerHTML = message;

        document.getElementById(
        "modal-icon"
        ).innerHTML = icon;

        document.getElementById(
        "custom-modal"
        ).style.display = "flex";

    });

}

function closeModal(result){

    document.getElementById(
    "custom-modal"
    ).style.display = "none";

    if(modalResolve){

        modalResolve(result);

    }

}

function getTopPercent(
data,
row,
key
){

const values =
data
.map(r=>Number(r[key]))
.filter(v=>!isNaN(v));

const target =
Number(row[key]);

if(
isNaN(target) ||
values.length===0
){
return "-";
}

const rank =

values
.filter(v=>v<target)
.length + 1;

const percent =

Math.round(
(rank/values.length)*100
);

return `상위 ${percent}%`;

}

function makePaceReason(row){

let reason = "";

if(row.주행유형 === "선행"){

    reason +=
    "초반 주도권 확보 가능성이 높으며 ";

}

else if(row.주행유형 === "선입"){

    reason +=
    "중위권 전개 운영이 가능하며 ";

}

else if(row.주행유형 === "추입"){

    reason +=
    "종반 추입력이 기대되며 ";

}

if(row.코스적합 === "우수"){

    reason +=
    "코스 적성이 매우 우수합니다.";

}
else if(row.코스적합 === "양호"){

    reason +=
    "코스 적성이 양호합니다.";

}
else{

    reason +=
    "전개 변수에 따라 성적이 달라질 수 있습니다.";

}

return reason;

}

else if(i===2) medal="🥉";

<span
class="track-horse"
>

${medal}
${h.번호}

</span>

`;

}

function getMiddleAll(data){

return [...data]
.map(r=>{

let score = Number(r.점수 || 0);

const flow =
String(r.평균경주전개 || "");

if(flow.includes("1")) score += 20;
if(flow.includes("2")) score += 15;
if(flow.includes("3")) score += 10;

if(r.주행유형==="선행")
score += 40;

else if(r.주행유형==="선입")
score += 25;

else if(r.주행유형==="추입")
score -= 20;

return {
...r,
simScore:score
};

})
.sort((a,b)=>b.simScore-a.simScore);

}

function getLateAll(data){

return [...data]
.map(r=>{

let score = Number(r.점수 || 0);

score += 50 - Number(r.평균G3F || 50);
score += 50 - Number(r.최고G3F || 50);
score += 20 - Number(r.평균G1F || 20);

if(r.주행유형==="추입") score += 15;
if(r.주행유형==="선입") score += 8;

return {
...r,
simScore:score
};

})
.sort((a,b)=>b.simScore-a.simScore);

}

function getEarlyTop3(data){

return [...data]

.map(r=>{

let score = 0;

if(r.주행유형==="선행") score+=40;
else if(r.주행유형==="선입") score+=25;
else if(r.주행유형==="보통") score+=10;

score +=
(20 - Number(r.평균S1F || 20));

return {
...r,
simScore:score
};

})

.sort(
(a,b)=>
b.simScore-a.simScore
)

.slice(0,3);

}

function getMiddleTop3(data){

return [...data]

.map(r=>{

let score = 0;

const flow =
String(
r.평균경주전개 || ""
);

if(flow.includes("1"))
score += 30;

if(flow.includes("2"))
score += 20;

if(flow.includes("3"))
score += 10;

score +=
Number(r.점수 || 0);

return {
...r,
simScore:score
};

})

.sort(
(a,b)=>
b.simScore-a.simScore
)

.slice(0,3);

}

function getLateTop3(data){

return [...data]

.map(r=>{

let score = 0;

score +=
(50 - Number(
r.평균G3F || 50
));

score +=
(50 - Number(
r.최고G3F || 50
));

score +=
(20 - Number(
r.평균G1F || 20
));

return {
...r,
simScore:score
};

})

.sort(
(a,b)=>
b.simScore-a.simScore
)

.slice(0,3);

}

function getLanePositions(
point,
horses,
step
){

const positions=[];

for(

let i=0;
i<horses.length;
i++

){

const h =
horses[i];

const ratio =

horses.length===1

? 0.5

: i/(horses.length-1);

const seed =
i + 1;

let zigzagX = 0;
let zigzagY = 0;

if(step==="step1"){

zigzagX =
Math.sin(seed * 1.7) * 3;

zigzagY =
Math.cos(seed * 1.3) * 2;

}
else if(step==="step2"){

zigzagX =
Math.sin(seed * 1.7) * 8;

zigzagY =
Math.cos(seed * 1.3) * 5;

}
else if(step==="step3"){

zigzagX =
Math.sin(seed * 1.7) * 15;

zigzagY =
Math.cos(seed * 1.3) * 10;

}
else if(step==="step4"){

zigzagX =
Math.sin(seed * 1.7) * 30;

zigzagY =
Math.cos(seed * 1.3) * 20;

}

let spreadX = 0;
let spreadY = 0;

if(step==="step1"){

spreadX =
Math.sin(i * 2.1) * 2;

spreadY =
(i - (horses.length-1)/2)
* 1;

}
else if(step==="step2"){

spreadX =
Math.sin(i * 2.1) * 3;

spreadY =
(i - (horses.length-1)/2)
* 1.5;

}
else if(step==="step3"){

spreadX =
Math.sin(i * 2.1) * 18;

spreadY =
(i - (horses.length-1)/2)
* 8;

}
else if(step==="step4"){

spreadX =
(horses.length - i)
* 15;

spreadY =
Math.sin(i * 1.5)
* 20;

}

let styleX = 0;
let styleY = 0;

if(step !== "start"){

if(h.주행유형==="선행"){

if(step==="step1"){
styleX = 12;
}
else if(step==="step2"){
styleX = 4;
}
else if(step==="step3"){
styleX = 2;
}
else{
styleX = 8;
}

}

else if(h.주행유형==="선입"){

if(step==="step1"){
styleX = 6;
}
else if(step==="step2"){
styleX = 6;
}
else if(step==="step3"){
styleX = 5;
}
else{
styleX = 4;
}

}

if(step==="step4"){

if(h.주행유형==="선행"){
styleX += 120;
}

else if(h.주행유형==="선입"){
styleX += 60;
}

else if(h.주행유형==="중위"){
styleX += 20;
}

else if(h.주행유형==="추입"){
styleX -= 30;
}

}

}

const minX =
Math.min(
point.innerX,
point.outerX
);

const maxX =
Math.max(
point.innerX,
point.outerX
);

let x =
point.innerX +
(
point.outerX -
point.innerX
)
*
ratio
+
zigzagX
+
spreadX
+
styleX;

let y =
point.innerY +
(
point.outerY -
point.innerY
)
*
ratio
+
zigzagY
+
spreadY
+
styleY;

if(step !== "step4"){

x = Math.max(
minX + 10,
Math.min(
maxX - 10,
x
)
);

}

positions.push({

x,
y

});

}

return positions;

}


function moveStep(step){

console.log(
"step=",
step
);

console.log(
"originalData=",
originalData
);

console.log(
"currentTrack=",
currentTrack
);

if(!originalData){

console.log(
"originalData 없음"
);

return;
}

if(step==="start"){

currentData =
[...originalData].sort(
(a,b)=>
Number(a.번호) -
Number(b.번호)
);

}
else if(

step==="mid2" ||
step==="step4"

){

currentData =
getLateAll(
originalData
);

}
else{

currentData =
getMiddleAll(
originalData
);

}

const point =
currentTrack[step];

if(!point){
return;
}

const lanePositions =
getLanePositions(
point,
currentData,
step
);

currentData.forEach(

(h,i)=>{

const pos =
lanePositions[i];

const horse =
document.getElementById(
`horse-${h.번호}`
);

if(horse){

horse.setAttribute(
"transform",
`translate(${pos.x},${pos.y})`
);

}

});

}

);

async function animateBetween(
fromPoint,
toPoint,
frames,
step
){

for(
let f=1;
f<=frames;
f++
){

const t =
f / frames;

const point = {

innerX:
fromPoint.innerX +
(
toPoint.innerX -
fromPoint.innerX
)
* t,

innerY:
fromPoint.innerY +
(
toPoint.innerY -
fromPoint.innerY
)
* t,

outerX:
fromPoint.outerX +
(
toPoint.outerX -
fromPoint.outerX
)
* t,

outerY:
fromPoint.outerY +
(
toPoint.outerY -
fromPoint.outerY
)
* t

};

const lanePositions =
getLanePositions(
point,
currentData,
step
);

console.log(
"lanePositions",
step,
lanePositions
);

currentData.forEach((h,i)=>{

const horse =
document.getElementById(
`horse-${h.번호}`
);

if(horse){

horse.setAttribute(
"transform",
`translate(
${lanePositions[i].x},
${lanePositions[i].y}
)`
);

}

});

await sleep(16);

}

}
