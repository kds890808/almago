<script>
async function loadAI(
    region,
    raceNo
) {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("로그인 필요");
    return;
  }

  const res = await fetch(
  "/analysis-table",
{
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (!res.ok) {

    alert("데이터 로드 실패");
    return;

}

  const data = await res.json();


// =========================
// 실제 금일/예정 경주 기준 연동
// =========================
const raceRes = await fetch("/race");

const raceData = await raceRes.json();

const realRaces =
raceData
.filter(r =>
    r.지역 === region
)
.map(r => ({

    region : r.지역,

    raceNo : String(r.경주),

    date : String(r.경주일자)
        .replace(/\(.*?\)/g,"")
        .trim()

}));


console.log("AI DATA =", data);
console.log("RACE DATA =", raceData);
console.log("첫번째 AI =", data[0]);

// 선택한 지역 + 경주만 출력

const filtered =
data.filter(r =>

    r.지역 === region &&

    String(r.경주) ===
    String(raceNo)

);

const latest =
filtered.length
? [filtered[0]]
: [];

console.log(
"filtered 개수:",
filtered.length
);

console.log(
"filtered 데이터:",
filtered
);

  


  if(filtered.length === 0){

    document.getElementById(
        "analysis-area"
    ).innerHTML =
    "현재 표시할 AI 분석이 없습니다.";

    return;

}
  
  const area = document.getElementById("analysis-area");
  area.innerHTML = "";

  for (const r of latest) {

    // 문자열 → 배열 변환
    const star = r.star || "-";
    const square = r.square || "-";
    const empty = r.empty || "-";
    const up = r.up || "-";
    const triangle = r.triangle || "-";
    const detailRes = await fetch(
`/race-detail-data/${r.경주}?date=${r.경주일자}&region=${r.지역}`
);

    const detailData =
    await detailRes.json();


console.log(
"선택AI",
r
);

const raceDate =
String(r.경주일자)
.replace(/\//g,"");

console.log(
"raceDate",
raceDate
);

console.log(
"기본분석 URL",
`/user-basic-analysis/${r.지역}/${r.경주}/${raceDate}`
);

const basicRes = await fetch(
`/user-basic-analysis/${r.지역}/${r.경주}/${raceDate}`
);

const basicData =
await basicRes.json();

console.log(
"basicData =",
basicData
);


// =======================
// 혈통분석 추가
// =======================
let bloodData = [];

if(r.지역 !== "제주"){

    const bloodRes = await fetch(
    `/user-blood-analysis/${r.지역}/${r.경주}/${raceDate}`
    );

    bloodData =
    await bloodRes.json();

}

console.log(
"bloodData =",
bloodData
);

let basicTable = "";
let basicComment = "";
let bloodComment = "";
let bloodTable = "";


// =======================
// 기본분석
// =======================

basicData.forEach(h=>{

    console.log(
        "개별데이터",
        h
    );

    let scoreClass = "";
    let rankText = "";

    if(h.점수 >= 100){

        scoreClass = "score-top";
        rankText = "🥇 유력";

    }else if(h.점수 >= 70){

        scoreClass = "score-good";
        rankText = "🥈 주력";

    }else if(h.점수 >= 50){

        scoreClass = "score-mid";
        rankText = "🥉 관심";

    }else{

        scoreClass = "score-low";
        rankText = "관망";

    }

    <td>${h.조교사승률}</td>

});

        <td>${h.거리적합 || "-"}</td>

    </div>

    </div>
    `;
});

console.log("bloodTable=", bloodTable);

alert(bloodTable);

console.log(
"조회",
r.지역,
r.경주,
r.경주일자
);

console.log(detailData);

    area.innerHTML += `
      <div style="background:white; padding:20px; margin-bottom:20px; border-radius:10px;">

        <h3>${r.지역} ${r.경주}경주</h3>

        

        <h4>출전마 정보</h4>

<div style="overflow-x:auto;">

<table>

<tr>

<th>번호</th>
<th>마명</th>
<th>성별</th>

<th>증감</th>

<th>마주</th>
<th>조교횟수</th>
<th>출전주기</th>

</tr>

${detailData.map(h=>`

<tr>

<td>${h.번호}</td>

<td>

<a
class="info-pill"
href="#"
onclick="
event.preventDefault();

"
>

🐎 ${h.마명}

</a>

</td>

<td>${h.성별 || "-"}</td>

<td>${h.나이 || "-"}</td>

<td>${h.레이팅 || "-"}</td>

<td>${h.부담중량 || "-"}</td>

<td>${h.증감 || "-"}</td>

<td>

<a
class="info-pill"

onclick="

>

</td>

<td>

<a

href="#"
onclick="

showTrainerInfo(

"
>

👨‍🏫 ${h.조교사 || "-"}

</a>

</td>

<td>${h.마주명 || "-"}</td>

<td>${h.조교횟수 || "-"}</td>

<td>${h.출전주기 || "-"}</td>

</tr>

`).join("")}

</table>

</div>

<hr>

<h3>기본분석</h3>

<div class="analysis-box">

<h4>
📊 비교 테이블
</h4>

<table>

<tr>

<th>번호</th>
<th>마명</th>

<th>성별</th>

</tr>

${basicTable}

<h4>

</h4>

${basicComment}

</div>

<hr>

${
r.지역 === "제주"

?

`

:

${bloodTable}

</table>

${bloodComment}

`
  }

</div>

<div
id="final-analysis-${r.지역}-${r.경주}"

>

    <div class="top-area">

        <div class="main-picks">

            <div class="pick">
                <div class="icon">★</div>
                <div class="name">1순위</div>

  }

}

const params =
new URLSearchParams(
location.search
);

const region =
params.get("region");

const raceNo =
params.get("raceNo");

console.log(
"지역:",
region,
"경주:",
raceNo
);

loadAI(
    region,

);

async function unlockPedigree(
region,
raceNo
){

    if(
        !confirm(
            "200P 사용 후 혈통분석을 열겠습니까?"
        )
    ){
        return;
    }

    const token =
    localStorage.getItem(
        "token"
    );

    const res =
    await fetch(
        "/use-blood-analysis",
        {
            method:"POST",
            headers:{
                "Authorization":
                `Bearer ${token}`
            }
        }
    );

    const data =
    await res.json();

    if(!res.ok){

        alert(
            data.detail ||
            "포인트 부족"
        );

        return;
    }

    alert(
        `차감 완료\n잔여포인트 : ${data.remain_point}P`
    );

    document.getElementById(
        `pedigree-${region}-${raceNo}`
    ).style.display = "block";

}

region,

async function unlockFinal(
    region,
    raceNo
){

    if(
        !confirm(
            "300P 사용 후 종합분석을 열겠습니까?"
        )
    ){
        return;
    }

    const token =
    localStorage.getItem(
        "token"
    );

    const res =
    await fetch(
        "/use-final-analysis",
        {
            method:"POST",
            headers:{
                "Authorization":
                `Bearer ${token}`
            }
        }
    );

    const data =
    await res.json();

    if(!res.ok){

        alert(
            data.detail ||
            "포인트 부족"
        );

        return;
    }

    alert(
        `차감 완료\n잔여포인트 : ${data.remain_point}P`
    );

    const target =
    document.getElementById(
        `final-analysis-${region}-${raceNo}`
    );

    if(target){
        target.style.display =
        "block";
    }

}

function getTopPercent(
data,
row,
key
){

const values =
data
.map(r=>Number(r[key]))
.filter(v=>!isNaN(v));

const target =
Number(row[key]);

if(
isNaN(target) ||
values.length===0
){
return "-";
}

const rank =

values
.filter(v=>v<target)
.length + 1;

const percent =

Math.round(
(rank/values.length)*100
);

return `상위 ${percent}%`;

}

function makePaceReason(row){

let reason = "";

if(row.주행유형 === "선행"){

    reason +=
    "초반 주도권 확보 가능성이 높으며 ";

}

else if(row.주행유형 === "선입"){

    reason +=
    "중위권 전개 운영이 가능하며 ";

}

else if(row.주행유형 === "추입"){

    reason +=
    "종반 추입력이 기대되며 ";

}

if(row.코스적합 === "우수"){

    reason +=
    "코스 적성이 매우 우수합니다.";

}
else if(row.코스적합 === "양호"){

    reason +=
    "코스 적성이 양호합니다.";

}
else{

    reason +=
    "전개 변수에 따라 성적이 달라질 수 있습니다.";

}

return reason;

}


function getEarlyTop3(data){

return [...data]

.map(r=>{

let score = 0;

if(r.주행유형==="선행") score+=40;
else if(r.주행유형==="선입") score+=25;
else if(r.주행유형==="보통") score+=10;

score +=
(20 - Number(r.평균S1F || 20));

return {
...r,
simScore:score
};

})

.sort(
(a,b)=>
b.simScore-a.simScore
)

.slice(0,3);

}

function getMiddleTop3(data){

return [...data]

.map(r=>{

let score = 0;

const flow =
String(
r.평균경주전개 || ""
);

if(flow.includes("1"))
score += 20;

if(flow.includes("2"))
score += 15;

if(flow.includes("3"))
score += 10;

score +=
Number(r.점수 || 0);

return {
...r,
simScore:score
};

})

.sort(
(a,b)=>
b.simScore-a.simScore
)

.slice(0,3);

}

function getLateTop3(data){

return [...data]

.map(r=>{

let score = 0;

score +=
(50 - Number(
r.평균G3F || 50
));

score +=
(50 - Number(
r.최고G3F || 50
));

score +=
(20 - Number(
r.평균G1F || 20
));

return {
...r,
simScore:score
};

})

.sort(
(a,b)=>
b.simScore-a.simScore
)

.slice(0,3);

}
