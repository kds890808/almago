<script>

// 로그인
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("https://almago-1llh.onrender.com/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("email", email);

        showMainUI();
    } else {
        alert(data.detail || data.msg);
    }
}

//회원가입
async function register() {
    console.log("🔥 회원가입 버튼 눌림");
    try {
        console.log("register 실행됨");

        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-password").value;
        const password2 = document.getElementById("reg-password2").value;
        const name = document.getElementById("reg-name").value;
        const birth = document.getElementById("reg-birth").value;
        const phone = document.getElementById("reg-phone").value;

        console.log(email, password, name, birth, phone);

        if (password !== password2) {
            alert("비밀번호가 다름");
            return;
        }

        console.log("🔥 fetch 직전");

        const res = await fetch("https://almago-1llh.onrender.com/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email, password, name, birth, phone
            })
        });

        console.log("🔥 fetch 완료", res);

        const data = await res.json();
        console.log("응답:", data);

        if (res.ok) {
            alert("회원가입 완료");
            showLogin();
        } else {
            alert("에러: " + JSON.stringify(data));
        }

    } catch (err) {
        console.error("🔥 에러 발생:", err);
        alert("에러 발생: " + err);
    }
}

// 로그아웃
function logout() {
    localStorage.clear();
    location.reload();
}

// UI 전환
function showMainUI() {
    document.getElementById("login-area").style.display = "none";
    document.getElementById("main-area").style.display = "block";

    // 🔥 추가 (핵심)
    document.getElementById("hero-area").style.display = "none";

    const email = localStorage.getItem("email");
    document.getElementById("user-info").innerHTML = `
      <div class="user-bar">
          <span>👤 ${email}</span>
          <button class="logout-mini" onclick="logout()">로그아웃</button>
      </div>
    `;

    loadMenus();
    loadAnalyses();
}

// 메뉴
async function loadMenus() {
    const res = await fetch("https://almago-1llh.onrender.com/menus");
    const data = await res.json();

    const container = document.getElementById("menu-area");
    container.innerHTML = "";

    data.forEach(m => {
        container.innerHTML += `
            <div class="card">
                <h3>${m.name}</h3>
                <button onclick="alert('${m.path}')">이동</button>
            </div>
        `;
    });
}

// 분석
async function loadAnalyses() {
    const token = localStorage.getItem("token");

    const res = await fetch("https://almago-1llh.onrender.com/analyses", {
        headers: {"Authorization": "Bearer " + token}
    });

    const data = await res.json();

    const list = document.getElementById("list");

    // 🔥 핵심 추가 (없으면 그냥 종료)
    if (!list) return;

    list.innerHTML = "";

    data.forEach(item => {
        list.innerHTML += `
            <div class="card">
                <h3>${item.title}</h3>
                <p>${item.content}</p>
            </div>
        `;
    });
}

// 자동 로그인
window.onload = async () => {
    const token = localStorage.getItem("token");
    if (token) showMainUI();

    try {
        await loadRaceForHome();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    } catch (e) {
        console.error("🔥 race 로드 실패:", e);
    }
};

// =========================
// 경주 타겟 저장
// =========================
let raceTargets = {
  서울: null,
  부산: null
};

// =========================
// 경주 데이터 불러오기
// =========================
async function loadRaceForHome() {
  const res = await fetch("https://almago-1llh.onrender.com/race");
  const data = await res.json();

  const now = new Date();

  const upcoming = data.filter(r => {
    const dt = parseDateTime(r.경주일자, r.출발시각);
    return dt > now;
  });

  upcoming.sort((a, b) =>
    parseDateTime(a.경주일자, a.출발시각) -
    parseDateTime(b.경주일자, b.출발시각)
  );

  // 지역별 첫 경기
  upcoming.forEach(r => {
    if (!raceTargets[r.지역]) {
      raceTargets[r.지역] = parseDateTime(r.경주일자, r.출발시각);
    }
  });
}

// =========================
// 날짜 파싱
// =========================
function parseDateTime(dateStr, timeStr) {
  const cleanDate = dateStr.split(" ")[0].replace(/\//g, "-");
  return new Date(`${cleanDate}T${timeStr}`);
}

// =========================
// 카운트다운
// =========================
function updateCountdown() {
  const now = new Date();

  function format(target) {
    if (!target) return "--:--";

    const diff = target - now;
    if (diff <= 0) return "출발";

    const day = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hour = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const min = Math.floor((diff / (1000 * 60)) % 60);
    const sec = Math.floor((diff / 1000) % 60);

    return `${day}일 ${hour}시간 ${min}분 ${sec}초전`;
      }

  document.getElementById("seoul-time").innerText =
    format(raceTargets["서울"]);

  document.getElementById("busan-time").innerText =
    format(raceTargets["부산"]);
}

// 회원가입
function showRegister() {
    document.getElementById("login-area").style.display = "none";
    document.getElementById("register-area").style.display = "block";
}

function showLogin() {
    document.getElementById("register-area").style.display = "none";
    document.getElementById("login-area").style.display = "block";
}

//홈화면분석보기
function goAI(region) {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("로그인 필요");
    return;
  }

  location.href = "ai.html?region=" + region;
}


function togglePassword(){

    const pw = document.getElementById("password");

    if(pw.type === "password"){
        pw.type = "text";
    }else{
        pw.type = "password";
    }
}
