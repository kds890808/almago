<style>
*{
    margin:0;

body{

.container{

.user-card{

.region-wrap{

.region-card{

.ai-btn{

.card{

.card button{

.bottom-menu{

.menu-item{

.menu-item div{

/* 👇 여기 추가 */
.ticket-card{
  width:45%;
  background:white;
  border:3px solid #2563eb;
  border-radius:20px;
  padding:20px;
  text-align:center;
  position:relative;
}

.ticket-title{
  font-size:20px;
  font-weight:bold;
  color:#2563eb;
  margin-bottom:15px;
}

.ticket-time{
  font-size:22px;
  line-height:1.4;
  font-weight:bold;
  color:#d40000;
}

.ticket-sub{
  font-size:20px;
  margin-bottom:15px;
}

.ticket-card button{
  background:#0f2f73;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
}

}
    .quick-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:20px;
}

.quick-card{
    border-radius:18px;
    padding:22px;

    display:flex;

    justify-content:space-between;

}

.quick-card:nth-child(1){

}

.quick-card:nth-child(2){

}

.quick-card:nth-child(3){

}

.quick-card:nth-child(4){

}

.quick-title{

.quick-sub{

.today-race-box{

}

.today-table-wrap{

}

.today-title{

#today-race-list{

.race-card{
    background:#f8f9ff;
    border:1px solid #dfe6ff;

.race-left{

.race-sub{

    color:#666;

.race-time{
    font-size:18px;
    font-weight:800;
    color:#111;
}

<script>

// 로그인
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("email", email);

        showMainUI();
    } else {
        alert(data.detail || data.msg);
    }
}

// 회원가입
async function register() {

    try {

        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-password").value;
        const password2 = document.getElementById("reg-password2").value;
        const name = document.getElementById("reg-name").value;
        const birth = document.getElementById("reg-birth").value;
        const phone = document.getElementById("reg-phone").value;

        if (password !== password2) {
            alert("비밀번호가 다릅니다");
            return;
        }

        const res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email, password, name, birth, phone
            })
        });

        const data = await res.json();

        if (res.ok) {
            alert("회원가입 완료");
            showLogin();
        } else {
            alert("에러: " + JSON.stringify(data));
        }

    } catch (err) {
        alert("에러 발생: " + err);
    }
}

// 로그아웃
function logout() {
    localStorage.clear();
    location.reload();
}

// 메인 UI
function showMainUI() {

    document.getElementById("login-area").style.display = "none";
    document.getElementById("register-area").style.display = "none";
    document.getElementById("main-area").style.display = "block";

    const email = localStorage.getItem("email");

    document.getElementById("user-info").innerHTML = `
      <div class="user-bar">
          <span>👤 ${email}</span>

          <button class="logout-top-btn" onclick="logout()">
              로그아웃
          </button>
      </div>
    `;

    loadMenus();
    loadAnalyses();
}

// 메뉴 로드
async function loadMenus() {

    const res = await fetch("/menus");
    const data = await res.json();

    const container = document.getElementById("menu-area");
    container.innerHTML = "";

    data.forEach(m => {
        container.innerHTML += `
            <div class="card">
                <h3>${m.name}</h3>
                <button onclick="alert('${m.path}')">이동</button>
            </div>
        `;
    });
}

// 분석 로드
async function loadAnalyses() {

    const token = localStorage.getItem("token");

    const res = await fetch("/analyses", {
        headers: {"Authorization": "Bearer " + token}
    });

    const data = await res.json();

    const list = document.getElementById("list");

    if (!list) return;

    list.innerHTML = "";

    data.forEach(item => {

        list.innerHTML += `
            <div class="card">
                <h3>${item.title}</h3>
                <p>${item.content}</p>
            </div>
        `;
    });
}

// 자동 로그인
window.onload = async () => {

    const token = localStorage.getItem("token");

    if (token) showMainUI();

    try {
        await loadRaceForHome();
        await loadTodayRaceTable();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    } catch (e) {
        console.error("race 로드 실패:", e);
    }
};

// 경주 타겟
let raceTargets = {
  서울: null,
  부산: null
};

// 경주 데이터
async function loadRaceForHome() {

  const res = await fetch("/race");
  const data = await res.json();

  const now = new Date();

  const upcoming = data.filter(r => {
    const dt = parseDateTime(r.경주일자, r.출발시각);
    return dt > now;
  });

  upcoming.sort((a, b) =>
    parseDateTime(a.경주일자, a.출발시각) -
    parseDateTime(b.경주일자, b.출발시각)
  );

  upcoming.forEach(r => {
    if (!raceTargets[r.지역]) {
      raceTargets[r.지역] = parseDateTime(r.경주일자, r.출발시각);
    }
  });
}

// 경주목록
async function loadTodayRaceTable(){

    const res = await fetch("/race");
    const data = await res.json();

    const raceList = document.getElementById("today-race-list");

    if(!raceList) return;

    raceList.innerHTML = "";

    data.forEach(r => {

        raceList.innerHTML += `
        
        <div class="race-card">

            <div class="race-left">

                <div class="race-title">
                    ${r.지역} ${r.경주}경주
                </div>

                <div class="race-sub">
                    ${formatRaceDate(r.경주일자)}
                    ·
                    ${formatDistance(r.거리)}
                    ·
                    ${r.출전}
                </div>

            </div>

            <div class="race-time">
                ${formatRaceTime(r.출발시각)}
            </div>

        </div>

        `;
    });
}

function formatRaceDate(value){
    if(!value) return "";

    const clean = String(value).split(" ")[0];

    if(clean.includes("/")){
        const parts = clean.split("/");
        return `${parts[1]}/${parts[2]}`;
    }

    if(clean.includes("-")){
        const parts = clean.split("-");
        return `${parts[1]}/${parts[2]}`;
    }

    return clean;
}

function formatDistance(value){
    if(!value) return "";
    return String(value).replace("m", "").replace("M", "");
}

function formatRaceTime(value){
    if(!value) return "";
    return String(value).slice(0,5);
}
    
// 날짜 파싱
function parseDateTime(dateStr, timeStr) {
  const cleanDate = dateStr.split(" ")[0].replace(/\//g, "-");
  return new Date(`${cleanDate}T${timeStr}`);
}

// 카운트다운
function updateCountdown() {

  const now = new Date();

  function format(target) {

    if (!target) return "--:--";

    const diff = target - now;

    if (diff <= 0) return "출발";

    const day = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hour = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const min = Math.floor((diff / (1000 * 60)) % 60);
    const sec = Math.floor((diff / 1000) % 60);

    return `${day}일 ${hour}시간 ${min}분 ${sec}초전`;
  }

    const seoul = format(raceTargets["서울"]);
    const busan = format(raceTargets["부산"]);

    const s1 = document.getElementById("seoul-time");
    const b1 = document.getElementById("busan-time");

    const s2 = document.getElementById("seoul-time2");
    const b2 = document.getElementById("busan-time2");

    if(s1) s1.innerText = seoul;
    if(b1) b1.innerText = busan;

    if(s2) s2.innerText = seoul;
    if(b2) b2.innerText = busan;
}

// 회원가입 전환
function showRegister() {
    document.getElementById("login-area").style.display = "none";
    document.getElementById("register-area").style.display = "block";
}

function showLogin() {
    document.getElementById("register-area").style.display = "none";
    document.getElementById("login-area").style.display = "block";
}

// AI 페이지 이동
function goAI(region) {

  const token = localStorage.getItem("token");

  if (!token) {
    alert("로그인 필요");
    return;
  }

  location.href = "ai.html?region=" + region;
}

// 비밀번호 보기
function togglePassword(){

    const pw = document.getElementById("password");

    if(pw.type === "password"){
        pw.type = "text";
    }else{
        pw.type = "password";
    }
}

</script>
