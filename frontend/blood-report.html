/* ===========================
   혈통 핵심 비교 강조
=========================== */

.compare-fill{

transition:
width 1s ease;

}

.compare-fill.highlight{

animation:
comparePulse
2s ease-in-out infinite;

}

@keyframes comparePulse{

0%{

filter:
brightness(1);

box-shadow:
0 0 4px rgba(34,197,94,.25);

}

50%{

filter:
brightness(1.45);

box-shadow:
0 0 8px #15803d,
0 0 18px #15803d,
0 0 30px rgba(21,128,61,.8);

}

100%{

filter:
brightness(1);

box-shadow:
0 0 4px rgba(34,197,94,.25);

}

}

async function loadUserInfo(){

function makeDosageChart(
dosage,
score
){

const labels=[
"Brilliant",
"Intermediate",
"Classic",
"Solid",
"Professional"
];

const korean = {

Brilliant:"순발형",

Intermediate:"스피드형",

Classic:"균형형",

Solid:"지구력형",

Professional:"장거리형"

};

const desc = {

Brilliant:"초반 가속",

Intermediate:"빠른 속도",

Classic:"균형 잡힌 혈통",

Solid:"후반 지구력",

Professional:"장거리 적성"

};

const colors=[
"#ef4444",
"#3b82f6",
"#22c55e",
"#f59e0b",
"#8b5cf6"
];

const values=
String(dosage||"")
.trim()
.split(/\s+/)
.map(Number);

const total=
values.reduce((a,b)=>a+b,0);

const cx=110;
const cy=110;
const r=96;

let startAngle=-90;

let paths="";

let maxIndex=0;

values.forEach((v,i)=>{

if(v>values[maxIndex]){
maxIndex=i;
}

});

values.forEach((v,i)=>{

if(total===0)return;

const angle=
v/total*360;

const endAngle=
startAngle+angle;

const x1=
cx+r*Math.cos(startAngle*Math.PI/180);

const y1=
cy+r*Math.sin(startAngle*Math.PI/180);

const x2=
cx+r*Math.cos(endAngle*Math.PI/180);

const y2=
cy+r*Math.sin(endAngle*Math.PI/180);

const large=
angle>180?1:0;

paths+=`

<path
d="
M ${cx} ${cy}
L ${x1} ${y1}
A ${r} ${r} 0 ${large} 1 ${x2} ${y2}
Z
"
fill="${colors[i]}"
stroke="white"
stroke-width="2"
/>

`;

startAngle=endAngle;

});

let legend="";

values.forEach((v,i)=>{

legend+=`

<div class="dosage-legend-row">

<div>

<div>

<span
class="legend-dot"
style="
background:${colors[i]};
"
></span>

<b>${korean[labels[i]]}</b>

<div
style="
font-size:11px;
color:#64748b;
margin-left:20px;
"
>

${labels[i]}

</div>

</div>

</div>

<b>${v}</b>

</div>

`;

});

return `

<div class="dosage-wrapper">

<div class="dosage-svg">

<svg
viewBox="0 0 260 260"
width="300"
height="300"
>

${paths}

<circle
cx="110"
cy="110"
r="60"
fill="white"
stroke="#e5e7eb"
stroke-width="2"
/>

<text
x="110"
y="76"
text-anchor="middle"
font-size="16"
fill="#64748b"
>

🧬

</text>

<text
x="110"
y="105"
text-anchor="middle"
font-size="22"
font-weight="900"
fill="#111827"
>

${korean[labels[maxIndex]]}

</text>

<text
x="110"
y="126"
text-anchor="middle"
font-size="13"
fill="#16a34a"
font-weight="700"
>

${labels[maxIndex]}

</text>

<text
x="110"
y="143"
text-anchor="middle"
font-size="11"
fill="#64748b"
>

${desc[labels[maxIndex]]}

</text>

<g>

<circle
cx="200"
cy="28"
r="18"
fill="#f59e0b"
/>

<text
x="200"
y="24"
text-anchor="middle"
font-size="9"
fill="white"
font-weight="700"
>

🏅

</text>

<text
x="200"
y="34"
text-anchor="middle"
font-size="11"
fill="white"
font-weight="900"
>

${score}

</text>

</g>

</svg>

</div>

<div class="dosage-legend">

${legend}

</div>

</div>

`;

}


function makeBloodCompare(bloodData){

let html=`

<div class="compare-card">

<h3>📊 혈통 핵심 비교</h3>

`;


// ======================
// CD
// ======================
html+=`

<div class="compare-section">

<h4>
🟢 CD(분포중심)
</h4>

<div style="
font-size:13px;
color:#64748b;
margin-top:4px;
margin-bottom:18px;
">

0을 기준으로 숫자가크면 단거리 작으면 장거리입니다

</div>

`;

const cdRank = [...bloodData]
.sort((a,b)=>Number(b.CD)-Number(a.CD));

bloodData.forEach(h=>{

const width =
Math.min(
100,
Number(h.CD||0)*100
);

// ★ Top5인지 확인
const isTop5 =
cdRank
.slice(0,5)
.some(x=>x.마명===h.마명);

html+=`

<div class="compare-row">

    <div class="compare-name">
        ${h.번호} ${h.마명}
    </div>

    <div class="compare-bar-wrap">

        <div class="compare-bar">

            <div
            class="
            compare-fill
            compare-cd
            ${isTop5 ? "highlight" : ""}
            "
            style="width:${width}%;">
            </div>

        </div>

        ${
        isTop5
        ?
        `<span class="compare-badge">🟢 우세</span>`
        :
        ""
        }

    </div>

    <div class="compare-value">
        ${h.CD}
    </div>

</div>

`;

});

html+=`
</div>
`;

// ======================
// DI
// ======================

html+=`

<div class="compare-section">

<h4>
🔵 DI(도시지지수)
</h4>

<div style="
font-size:13px;
color:#64748b;
margin-top:4px;
margin-bottom:18px;
">

높을수록 스피드형, 낮을수록 지구력형 혈통입니다.

</div>

`;

const diRank = [...bloodData]
.sort((a,b)=>Number(b.DI)-Number(a.DI));

bloodData.forEach(h=>{

const width =
Math.min(
100,
Number(h.DI||0)*25
);

// ★ Top5인지 확인
const isTop5 =
diRank
.slice(0,5)
.some(x=>x.마명===h.마명);

html+=`

<div class="compare-row">

    <div class="compare-name">
        ${h.번호} ${h.마명}
    </div>

    <div class="compare-bar-wrap">

        <div class="compare-bar">

            <div
            class="
            compare-fill
            compare-di
            ${isTop5 ? "highlight" : ""}
            "
            style="width:${width}%;">
            </div>

        </div>

        ${
        isTop5
        ?
        `<span class="compare-badge">🟢 우세</span>`
        :
        ""
        }

    </div>

    <div class="compare-value">
        ${h.DI}
    </div>

</div>

`;

});

html+=`
</div>
`;

// ======================
// COI
// ======================

html+=`

<div class="compare-section">

<div class="compare-title">

🔴 COI(근친교배계수)

<div style="
font-size:13px;
color:#64748b;
margin-top:4px;
font-weight:500;
">

근친도 (낮을수록 안정적)

🟡 주의 : 오늘 출전마 중 근친도가 높은 편
🔴 위험 : 12.5% 이상

</div>

</div>

`;

const coiRank = [...bloodData]
.sort((a,b)=>Number(b.근친)-Number(a.근친));

const relativeDanger =
coiRank.slice(0,3);

bloodData.forEach(h=>{

const coi =
Number(h.근친||0);

const width =
Math.min(
100,
coi*8
);

// ---------------------
// 배지 판정
// ---------------------

const isRelativeDanger =
relativeDanger.some(
x=>x.마명===h.마명
);

let badge = "";
let badgeClass = "";

if(coi >= 12.5){

    badge = "🔴 위험";
    badgeClass = "compare-danger";

}
else if(isRelativeDanger){

    badge = "🟡 주의";
    badgeClass = "compare-warning";

}
else{

    badge = "🟢 정상";
    badgeClass = "compare-normal";

}

html+=`

<div class="compare-row">

    <div class="compare-name">

        ${h.번호}
        ${h.마명}

    </div>

    <div class="compare-bar-wrap">

        <div class="compare-bar">

            <div
            class="
            compare-fill
            compare-coi
            ${isRelativeDanger ? "highlight" : ""}
            "
            style="
            width:${width}%;
            ">
            </div>

        </div>

        ${
        badge
        ?
        `
        <span class="${badgeClass}">
        ${badge}
        </span>
        `
        :
        ""
        }

    </div>

    <div class="compare-value">

        ${coi.toFixed(2)}%

    </div>

</div>

`;

});

html+=`

</div>

`;

return html;

}

let modalResolve = null;

function showModal(
title,
message,
icon="📌"
){

    return new Promise(resolve=>{

        modalResolve = resolve;

        document.getElementById(
        "modal-title"
        ).innerHTML = title;

        document.getElementById(
        "modal-message"
        ).innerHTML = message;

        document.getElementById(
        "modal-icon"
        ).innerHTML = icon;

        document.getElementById(
        "custom-modal"
        ).style.display = "flex";

    });

}

function closeModal(result){

    document.getElementById(
    "custom-modal"
    ).style.display = "none";

    if(modalResolve){

        modalResolve(result);

    }

}

async function unlockPedigree(
region,
raceNo
){

    const ok =
    await showModal(

        "혈통분석",

        `확인 버튼을 누르면
        ${bloodFee}P가 차감됩니다.`,

        "🧬",

        true

    );

    if(!ok){
        return;
    }

    const token =
    localStorage.getItem(
        "token"
    );

    const res =
    await fetch(
        "/use-blood-analysis",
        {
            method:"POST",
            headers:{
                "Authorization":
                `Bearer ${token}`
            }
        }
    );

    const data =
    await res.json();

    if(!res.ok){

        await showModal(

            "혈통분석",

            data.detail ||
            "포인트 부족",

            "❌",

            false

        );

        return;
    }

    await showModal(

        "혈통분석",

        `${data.use_point}P 차감 완료<br><br>

        <div style="

        margin:15px 0 20px 0;

        padding:14px;

        background:
        linear-gradient(
        90deg,
        #14532d,
        #166534,
        #22c55e
        );

        border-radius:14px;

        font-weight:800;
        font-size:17px;

        color:#be185d;

        border-left:6px solid #ec4899;

        ">

        🧬 AI가 경주마의 유전적 혈통을 기반으로 분석합니다.

        </div>

        남은 포인트 :
        ${data.remain_point}P`,

        "🧬",

        false

    );

    document.getElementById(
        `pedigree-${region}-${raceNo}`
    ).style.display = "block";

}

function getTopPercent(
data,
row,
key
){

const values =
data
.map(r=>Number(r[key]))
.filter(v=>!isNaN(v));

const target =
Number(row[key]);

if(
isNaN(target) ||
values.length===0
){
return "-";
}

const rank =

values
.filter(v=>v<target)
.length + 1;

const percent =

Math.round(
(rank/values.length)*100
);

return `상위 ${percent}%`;

}

-

</div>

<div class="awd-state">

⚪ AWD 데이터 없음

</div>

let state = "";
let star = "";

if(Math.abs(diff)<=200){

    star="★★★★★";

}
else if(Math.abs(diff)<=400){

    star="★★★★☆";

else{

    star="★★☆☆☆";

}

return `

    </div>

    </div>

    <div class="awd-diff">

    ${diff>=0?"+":""}${diff}m

    </div>

    <div class="awd-star">

    ${star}

    </div>

    <div class="awd-state">

    ${state}

    </div>

</div>

`;

function getAwdPartScore(
awd,
raceDistance,
maxScore
){

if(
!Number.isFinite(awd) ||
awd <= 0
){
return 0;
}

const diff =
Math.abs(
awd - raceDistance
);

let rate = 0;

if(diff <= 100){
rate = 1;
}
else if(diff <= 200){
rate = 0.9;
}
else if(diff <= 400){
rate = 0.7;
}
else if(diff <= 600){
rate = 0.45;
}
else if(diff <= 800){
rate = 0.25;
}
else{
rate = 0.1;
}

return Math.round(
maxScore * rate
);

}


function calcAwdScore(
father,
mother,
mFather,
raceDistance
){

const fatherScore =
getAwdPartScore(
father,
raceDistance,
35
);

const motherScore =
getAwdPartScore(
mother,
raceDistance,
35
);

const mFatherScore =
getAwdPartScore(
mFather,
raceDistance,
30
);

const total =
fatherScore +
motherScore +
mFatherScore;

return {

total:total,

father:fatherScore,

mother:motherScore,

mFather:mFatherScore

};

}

function makeAwdComment(
father,
mother,
mFather,
raceDistance
){

const fatherDiff =
father-raceDistance;

const motherDiff =
mother-raceDistance;

const mFatherDiff =
mFather-raceDistance;

let comment="";

// ---------------------
// 부계
// ---------------------

if(fatherDiff>300){

comment +=
"부계는 중·장거리 지구력 혈통 성향이 강합니다.<br>";

}
else if(fatherDiff<-300){

comment +=
"부계는 단거리 스피드 혈통 성향이 강합니다.<br>";

}
else{

comment +=
"부계는 현재 거리와 좋은 균형을 보입니다.<br>";

}

// ---------------------
// 모계
// ---------------------

if(motherDiff>300){

comment +=
"모계는 중·장거리 혈통의 영향을 받습니다.<br>";

}
else if(motherDiff<-300){

comment +=
"모계는 단거리 스피드 혈통의 영향이 큽니다.<br>";

}
else{

comment +=
"모계는 현재 거리와 가장 잘 어울립니다.<br>";

}

// ---------------------
// 종합
// ---------------------

const avg =
(
Math.abs(fatherDiff)+
Math.abs(motherDiff)+
Math.abs(mFatherDiff)
)/3;

if(avg<=200){

comment +=
`오늘 <b>${raceDistance}m</b>는
혈통적으로 매우 이상적인 거리입니다.`;

}
else if(avg<=400){

comment +=
`오늘 <b>${raceDistance}m</b>는
혈통과 잘 맞는 거리입니다.`;

}
else{

comment +=
`오늘 <b>${raceDistance}m</b>는
혈통과 다소 차이가 있는 거리입니다.`;

}

return `

<div class="awd-ai">

<div class="awd-ai-title">

🤖 AI 혈통 해석

</div>

<div class="awd-ai-body">

${comment}

</div>

</div>

`;

}
