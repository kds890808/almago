function showModal(
title,
message,
icon="📌"
){

    return new Promise(resolve=>{

        modalResolve = resolve;

        document.getElementById(
        "modal-title"
        ).innerHTML = title;

        document.getElementById(
        "modal-message"
        ).innerHTML = message;

        document.getElementById(
        "modal-icon"
        ).innerHTML = icon;

        document.getElementById(
        "custom-modal"
        ).style.display = "flex";

    });

}

function closeModal(result){

    document.getElementById(
    "custom-modal"
    ).style.display = "none";

    if(modalResolve){

        modalResolve(result);

    }

}

function getGroupComment(grade){

switch(grade){

case "S":
return `
가장 높은 평가를 받은 최상위 전력입니다.<br>
우승 후보로 가장 유력합니다.
`;

case "A+":
return `
입상 가능성이 매우 높습니다.<br>
우승 경쟁이 충분한 전력입니다.
`;

case "A":
return `
상위권 경쟁력이 있습니다.<br>
입상권 후보입니다.
`;

case "B+":
return `
상위권과 중위권의 경계입니다.<br>
전개에 따라 충분히 입상이 가능합니다.
`;

case "B":
return `
중위권 이상의 경쟁력을 갖추고 있습니다.<br>
복병으로 관심을 가져볼 만합니다.
`;

case "C+":
return `
변수 요소가 있는 전력입니다.<br>
경주 흐름에 따라 기대 이상의 결과도 가능합니다.
`;

case "C":
return `
객관적인 전력은 다소 부족합니다.<br>
관망 전략이 적절합니다.
`;

case "D":
case "D+":
return `
입상 가능성은 높지 않습니다.<br>
이변이 필요합니다.
`;

default:
return `
현실적으로 쉽지 않은 경주입니다.
`;

}

}
