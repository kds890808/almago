<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>오늘의 경주</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
Pretendard,
sans-serif;

background:#f5f7fb;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

padding:40px 25px;

border-radius:24px;

width:90%;

max-width:420px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

}

.icon{

font-size:64px;

margin-bottom:20px;

}

.title{

font-size:30px;

font-weight:900;

margin-bottom:14px;

color:#0f172a;

}

.desc{

font-size:16px;

line-height:1.7;

color:#64748b;

margin-bottom:28px;

}

.notice-box{

    background:#fff8e6;

    border:2px solid #ffd166;

    border-radius:16px;

    padding:18px;

    margin-bottom:28px;

    text-align:center;

}

.notice-title{

    font-size:18px;

    font-weight:800;

    color:#d97706;

    margin-bottom:10px;

}

.notice-text{

    font-size:20px;

    line-height:1.8;

    color:#475569;

}

.notice-text strong{

    color:#2563eb;

}

.go-btn{

width:100%;

padding:16px;

border:none;

border-radius:16px;

background:
linear-gradient(
135deg,
#22c55e,
#4ade80
);

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

}

.back-btn{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:16px;

background:#e2e8f0;

font-size:16px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">
🏇
</div>

<div class="title">
마권 구매 안내
</div>

<div class="notice-box">

    <div class="notice-title">
    📢 안내사항
    </div>

    <div class="notice-text">
    경마 정보 제공 플랫폼 알마고는 <br>경마인들의 건전한 경마 이용을 위해
    <br><strong> 마권구매 서비스를 제공하지 않습니다.</strong>

    <br><br>마권 구매는 한국마사회 공식앱인
    <br><strong>더비온 앱</strong>을 통해 이용하실 수 있습니다.

    <br><br>

    더비온 앱이 설치되어 있지 않다면
    <br><strong>"더비온 바로가기"</strong>
    <br>버튼을 눌러 앱 설치 후 이용해주세요.

    <br>


    </div>

</div>

<button
class="go-btn"
onclick="goDerbyOn()"
>

더비온 바로가기

</button>

<button
class="back-btn"
onclick="history.back()"
>

뒤로가기

</button>

</div>

<script>

function goDerbyOn(){

location.href =
"https://m.kra.co.kr/comp/view/appDown/mycardApp4.do";

}


</script>

</body>
</html>
