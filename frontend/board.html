<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>게시판</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top h1{
    margin:0;
}

button{
    border:none;
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1f2937;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
    text-align:center;
}

tr:hover{
    background:#f9fafb;
}

.modal{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);

    display:none;

    justify-content:center;
    align-items:center;
}

.modal-box{
    width:500px;
    background:white;
    border-radius:12px;
    padding:20px;
}

input, textarea{
    width:100%;
    margin-bottom:12px;
    padding:10px;
    border:1px solid #d1d5db;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    height:200px;
    resize:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="top">

        <h1 id="board-title">
            게시판
        </h1>

        <button onclick="openWrite()">
            글쓰기
        </button>

    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th style="width:80px;">번호</th>
                    <th>제목</th>
                    <th style="width:120px;">작성자</th>
                    <th style="width:180px;">작성일</th>
                </tr>
            </thead>

            <tbody id="post-list">
            </tbody>

        </table>

    </div>

</div>

<!-- 글쓰기 -->
<div class="modal" id="write-modal">

    <div class="modal-box">

        <h2>글쓰기</h2>

        <input
            id="write-title"
            placeholder="제목">

        <input
            id="write-writer"
            placeholder="작성자">

        <textarea
            id="write-content"
            placeholder="내용"></textarea>

        <button onclick="savePost()">
            저장
        </button>

    </div>

</div>

<script>

const params =
    new URLSearchParams(location.search);

const menuId =
    params.get("menu");

document.getElementById("board-title")
    .innerText =
    "게시판 #" + menuId;

// =========================
// 글쓰기 열기
// =========================
function openWrite(){

    document.getElementById("write-modal")
        .style.display = "flex";
}

// =========================
// 글 저장
// =========================
function savePost(){

    const title =
        document.getElementById("write-title").value;

    const writer =
        document.getElementById("write-writer").value;

    const content =
        document.getElementById("write-content").value;

    if(!title || !writer || !content){

        alert("전부 입력");

        return;
    }

    const postList =
        document.getElementById("post-list");

    const no =
        postList.children.length + 1;

    const date =
        new Date().toLocaleString();

    postList.innerHTML += `

<tr>

    <td>${no}</td>

    <td style="text-align:left;">
        ${title}
    </td>

    <td>${writer}</td>

    <td>${date}</td>

</tr>

`;

    document.getElementById("write-modal")
        .style.display = "none";

    document.getElementById("write-title").value = "";
    document.getElementById("write-writer").value = "";
    document.getElementById("write-content").value = "";
}

</script>

</body>
</html>
