<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

.admin { display:flex; height:100vh; }

/* 사이드바 */
.sidebar {

  width:220px;
  min-width:220px;

  background:#1f2a37;
  color:white;

  padding:20px;

  flex-shrink:0;
  box-sizing:border-box;
}

.sidebar h2 { margin-bottom:20px; }

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  background:none;
  color:#cbd5e1;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover {
  background:#374151;
  color:white;
}

/* 콘텐츠 */
.content {

  flex:1;
  padding:30px;

  overflow-x:auto;
}

/* 카드 */
.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea {

  width:100%;
  height:42px;

  padding:0 12px;

  margin:8px 0;

  border:1px solid #d1d5db;
  border-radius:4px;

  box-sizing:border-box;

  font-size:14px;
}

button.main {

  background:#2563eb;
  color:white;

  width:100%;
  height:42px;

  border:none;
  border-radius:4px;

  font-size:15px;
  font-weight:bold;

  cursor:pointer;
}

/* 🔥 여기 추가 */
table {

    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.trainer-table{

    width:100%;
    border-collapse:collapse;

    table-layout:auto;
}

.trainer-table td{

    padding:12px;

    white-space:normal;
    word-break:break-word;

}

.trainer-table td:nth-child(1),
.trainer-table td:nth-child(3){

    width:140px;
    font-weight:bold;
}

.trainer-table td{

    word-break:break-word;
    overflow-wrap:break-word;
}

th{
  background:#1f2a37;
  color:white;
  padding:10px;
}

td{

    padding:10px;

    text-align:center;

    border-bottom:1px solid #ddd;

    word-break:break-word; /* 긴 내용 줄바꿈 */

    overflow-wrap:break-word;
}

tr:nth-child(even) {
  background: #f9fafb;
}

/* ===== 뱃지 ===== */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
}

.badge-premium {
  background: #22c55e;
  color: white;
}

.badge-free {
  background: #9ca3af;
  color: white;
}

.badge-admin {
  background: #f59e0b;
  color: white;
  margin-left: 6px;
}

/* ===== 버튼 ===== */
.btn {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin: 2px;
  transition: all 0.2s ease;
}

.btn:hover {
  transform: scale(1.05);
}

.btn:active {
  transform: scale(0.9);
}

.btn-premium {
  background: #22c55e;
  color: white;
}

.btn-admin {
  background: #3b82f6;
  color: white;
}

.btn-delete {
  background: #ef4444;
  color: white;
}

  .admin-table input{
    width:100%;
    padding:6px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:13px;
}

.admin-table button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

  #admin-login{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f4f6f8;
}

.login-card{
    width:360px;

    background:white;

    padding:30px;

    border-radius:16px;

    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-card h2{
    margin-bottom:20px;
    text-align:center;
}

  .race-tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.race-tabs button{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#1f2a37;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.race-tabs button:hover{
    background:#2d3d50;
    transform:translateY(-2px);
}

  .dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:15px;
    margin-top:15px;
}

.stat-box{
    background:#f4f6f8;
    border-radius:14px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.stat-title{
    font-size:14px;
    color:#666;
    margin-bottom:10px;
}

.stat-value{
    font-size:28px;
    font-weight:bold;
    color:#1f2a37;
}

.trainer-tabs{
    display:flex;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}

.trainer-tabs .main{

    width:120px !important;
    height:40px !important;

    padding:0 !important;
    flex:none !important;

    background:#2563eb;
    color:white;

    border:none;
    border-radius:8px;

    font-size:14px;
    font-weight:bold;

    cursor:pointer;
}

  .upload-btn{

    width:300px;

    height:42px;

    background:#2563eb;
    color:white;

    border:none;
    border-radius:8px;

    font-size:15px;
    font-weight:bold;

    cursor:pointer;

}
    .upload-area{

    display:inline-flex;

    align-items:center;

    gap:10px;

    margin:15px 0;

    width:auto;
}

.upload-area input[type="file"]{

    width:220px !important;

    flex:none;
}

.upload-btn{

    width:180px !important;

    flex:none;

.trainer-table{

    width:100%;
    border-collapse:collapse;

    table-layout:auto;
}

.trainer-table td{

    padding:12px;
    text-align:left;
}

.trainer-table td:nth-child(1),
.trainer-table td:nth-child(3){

    width:140px;
    font-weight:bold;
}

.trainer-content{

    margin-top:15px;
}

.trainer-card{

    width:100%;
    max-width:100%;
    overflow:hidden;
    box-sizing:border-box;
}
  
</style>
</head>

// =========================
// 조교사 업로드
// =========================
async function uploadTrainerInfo(){

const file=
document.getElementById(
"trainerFile"
).files[0];

if(!file){

alert(
"파일 선택해줘"
);

return;

}

const formData=
new FormData();

formData.append(
"file",
file
);

const res=
await fetch(
"/upload-trainer",
{
method:"POST",
body:formData
}
);

const data=
await res.json();

alert(
data.message
);

loadTrainer();

}

function logout() {

    localStorage.clear();

    document.getElementById("admin-main")
        .style.display = "none";

    document.getElementById("admin-login")
        .style.display = "flex";
}

// =========================
// 관리자화면

function showAdminPage(){

    document.getElementById("admin-login").style.display = "none";
    document.getElementById("admin-main").style.display = "flex";

    showPage('dashboard');
}
// =========================
// 분석 조회
// =========================
async function loadAnalyses() {
  const token = localStorage.getItem("token");

  const res = await fetch("/analysis-table", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  const list = document.getElementById("analysis-list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        ${item.region} ${item.race_no}경주<br>
        ★ ${item.star} / ■ ${item.square} / ▲ ${item.up}
      </div>
    `;
  });
}

// =========================
// 유료변경
// =========================
async function togglePremium(id, currentPremium, currentAdmin) {
  const token = localStorage.getItem("token");

  const res = await fetch(`/users/${id}?is_premium=${!currentPremium}&is_admin=${currentAdmin}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (!res.ok) {
    alert("실패: " + res.status);
    return;
  }

  loadUsers();
}

// =========================
// 관리자변경
// =========================
async function toggleAdmin(id, currentPremium, currentAdmin) {
  const token = localStorage.getItem("token");

  await fetch(`/users/${id}?is_premium=${currentPremium}&is_admin=${!currentAdmin}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  loadUsers();
}

// =========================
// 삭제
// =========================
async function deleteUser(id, isAdmin = false) {

  const token = localStorage.getItem("token");

  if (!confirm("진짜 삭제할까?")) return;

  await fetch(
    `/users/${id}`,
    {
      method: "DELETE",

      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  if(isAdmin){
    loadAdmins();
  }else{
    loadUsers();
  }
}

// =========================
// 메뉴삭제
// =========================
async function deleteSidebarMenu(id) {
  const token = localStorage.getItem("token");

  if (!confirm("진짜 삭제할까?")) return;

  const res = await fetch(`/menus/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (res.ok) {
    alert("삭제 완료");
  } else {
    const data = await res.json();
    alert(data.detail);
  }
}

// =========================
// 회원조회
// =========================
async function loadUsers() {
  const token = localStorage.getItem("token");

  const res = await fetch("/admin/users", {

async function handleAction(button, action) {
  const originalText = button.innerText;

  button.disabled = true;
  button.innerText = "처리중...";

  try {
    await action();  // 🔥 핵심 수정

  button.disabled = false;
  button.innerText = originalText;
}

  renderTable();

function getCountdown(date,time){

const raceDate=new Date(
`${date} ${time}`
);

const now=new Date();

const diff=
raceDate-now;

if(diff<=0){
return "종료";
}

const days=Math.floor(
diff/(1000*60*60*24)
);

const hours=Math.floor(
(diff%(1000*60*60*24))
/
(1000*60*60)
);

const mins=Math.floor(
(diff%(1000*60*60))
/
(1000*60)
);

if(days===0){
return `🔴 ${hours}시간 ${mins}분`;
}

if(days===1){
return `🟠 내일`;
}

if(days<=3){
return `🟡 ${days}일`;
}

return `🟢 ${days}일`;
}

function renderTable() {

const table =
document.getElementById(
"race-table"
);

if(!table){
return;
}

table.innerHTML="";

raceData.forEach(
(r,rowIndex)=>{

const cells = [

r[1], // 지역
r[2], // 마명
r[3], // 순
r[4], // 경주일자
r[5], // 경주
r[6], // 등급
r[7], // 거리
r[8], // 편성
r[9], // 출전
r[10], // 경주명
r[11], // 출발시각

getCountdown(
r[4],
r[11]
),

r[12] // 비고

];

table.innerHTML += `
<tr>

<td>
<input
type="checkbox"
class="row-check"
value="${r[0]}">
</td>

${cells.map((cell,colIndex)=>{

return `
<td ondblclick="editCell(this, ${rowIndex}, ${colIndex+1})">
${String(cell)==="NaN" ? "" : (cell || "")}
</td>
`;

}).join("")}

<td>
<button onclick="deleteRow(${rowIndex})">
🗑
</button>
</td>

</tr>
`;

});

}

function editCell(td, rowIndex, colIndex) {
  const oldValue = td.innerText;

  td.innerHTML = `<input type="text" value="${oldValue}" style="width:100%">`;

  const input = td.querySelector("input");
  input.focus();

  // Enter 누르면 저장
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      saveCell(td, input.value, rowIndex, colIndex);
    }
  });

  // 포커스 벗어나도 저장
  input.addEventListener("blur", function() {
    saveCell(td, input.value, rowIndex, colIndex);
  });
}

  async function updateMenu(id){

    const token = localStorage.getItem("token");

    const body = {

        name:
            document.getElementById(`name-${id}`).value,

        path:
            document.getElementById(`path-${id}`).value,

        icon:
            document.getElementById(`icon-${id}`).value,

        description:
            document.getElementById(`desc-${id}`).value,

        sort_order:Number(
            document.getElementById(`order-${id}`).value
        ),

        is_active:

    };
