// =========================
// 분석 조회
// =========================
async function loadAnalyses() {
  const token = localStorage.getItem("token");

  const res = await fetch("https://almago-1llh.onrender.com/analysis-table", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  const list = document.getElementById("analysis-list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        ${item.region} ${item.race_no}경주<br>
        ★ ${item.star} / ■ ${item.square} / ▲ ${item.up}
      </div>
    `;
  });
}

// =========================
// 유료변경
// =========================
async function togglePremium(id, currentPremium, currentAdmin) {
  const token = localStorage.getItem("token");

  const res = await fetch(`https://almago-1llh.onrender.com/users/${id}?is_premium=${!currentPremium}&is_admin=${currentAdmin}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (!res.ok) {
    alert("실패: " + res.status);
    return;
  }

  loadUsers();
}

// =========================
// 관리자변경
// =========================
async function toggleAdmin(id, currentPremium, currentAdmin) {
  const token = localStorage.getItem("token");

  await fetch(`https://almago-1llh.onrender.com/users/${id}?is_premium=${currentPremium}&is_admin=${!currentAdmin}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  loadUsers();
}

// =========================
// 삭제
// =========================
async function deleteUser(id) {
  const token = localStorage.getItem("token");

  if (!confirm("진짜 삭제할까?")) return;

  await fetch(`https://almago-1llh.onrender.com/users/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  loadUsers();
}

async function createMenu() {
  const token = localStorage.getItem("token");

  const name = document.getElementById("menu-name").value;
  const path = document.getElementById("menu-path").value;

  const res = await fetch("https://almago-1llh.onrender.com/menus", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      name: name,
      path: path
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert("메뉴 생성 완료");
    loadSidebarMenus();
  } else {
    alert(data.detail);
  }
}

}

// =========================
// 메뉴추가

async function addMenuPrompt() {
  const name = prompt("메뉴 이름 입력");
  if (!name) return;

  const path = prompt("경로 입력");
  if (!path) return;

  const token = localStorage.getItem("token");

  const res = await fetch("https://almago-1llh.onrender.com/menus", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ name, path })
  });

  if (res.ok) {
    alert("메뉴 생성 완료");
    loadSidebarMenus(); // 🔥 바로 반영
  } else {
    const data = await res.json();
    alert(data.detail);
  }
}

// =========================
// 메뉴로드
// =========================
async function loadSidebarMenus() {
  const res = await fetch("https://almago-1llh.onrender.com/menus");
  const data = await res.json();

  const menuList = document.getElementById("menu-list");
  menuList.innerHTML = "";

  data.forEach(m => {
    const wrapper = document.createElement("div");

    wrapper.style.display = "flex";
    wrapper.style.justifyContent = "space-between";
    wrapper.style.alignItems = "center";

    const btn = document.createElement("button");
    btn.innerText = "📄 " + m.name;
    btn.onclick = () => alert(m.path);

    // 🔥 이거 추가
    const delBtn = document.createElement("button");

    delBtn.innerText = "🗑";
    delBtn.style.background = "transparent";
    delBtn.style.border = "none";
    delBtn.style.color = "#9ca3af";
    delBtn.style.cursor = "pointer";

    delBtn.onmouseover = () => delBtn.style.color = "#ef4444";
    delBtn.onmouseout = () => delBtn.style.color = "#9ca3af";

    delBtn.onclick = () => deleteMenu(m.id);

    wrapper.appendChild(btn);
    wrapper.appendChild(delBtn);

    menuList.appendChild(wrapper);
  });
}

async function deleteMenu(id) {

// =========================
// 회원조회

async function loadUsers() {
  const token = localStorage.getItem("token");

  const res = await fetch("https://almago-1llh.onrender.com/admin/users", {
    headers: { "Authorization": "Bearer " + token }
  });

  console.log("🔥 상태코드:", res.status);

  const data = await res.json();
  console.log("🔥 유저 데이터:", data);

  if (!Array.isArray(data)) {
    alert("유저 데이터 오류: " + JSON.stringify(data));
    return;
  }

  const table = document.getElementById("user-table");
  table.innerHTML = "";

  data.forEach(u => {
    table.innerHTML += `
      <tr>
        <td>${u.id}</td>

        <td>
          ${u.email}
          ${u.is_admin ? '<span class="badge badge-admin">관리자</span>' : ''}
        </td>

        <td>${u.name || "-"}</td>
        <td>${u.birth || "-"}</td>
        <td>${u.phone || "-"}</td>

        <td>
          <span class="badge ${u.is_premium ? 'badge-premium' : 'badge-free'}">
            ${u.is_premium ? '유료' : '무료'}
          </span>
        </td>

        <td>
          <button class="btn btn-premium"
            onclick="handleAction(this, () => togglePremium(${u.id}, ${u.is_premium}, ${u.is_admin}))">
            유료
          </button>

          <button class="btn btn-admin"
            onclick="handleAction(this, () => toggleAdmin(${u.id}, ${u.is_premium}, ${u.is_admin}))">
            관리자
          </button>

          <button class="btn btn-delete"

    `;
  });
}

// =========================
// 애니메이션
// =========================
async function handleAction(button, action) {
  const originalText = button.innerText;

  button.disabled = true;
  button.innerText = "처리중...";

  try {
    await action();  // 🔥 핵심 수정
  } catch (e) {
    alert("에러 발생: " + e);
  }

  button.disabled = false;
  button.innerText = originalText;
}

async function loadRace() {
  const res = await fetch("https://almago-1llh.onrender.com/race");
  const data = await res.json();

  raceData = data.map(r => [
    r.id,
    r.지역,
    r.순,
    r.경주일자,
    r.경주,
    r.등급,
    r.거리,
    r.편성,
    r.출전,
    r.경주명,
    r.출발시각,
    r.비고
  ]);

  renderTable();
}


// =========================
// 출전표수정삭제
// =========================
async function uploadRace() {
  const file = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("file", file);

  await fetch("https://almago-1llh.onrender.com/upload-race", {
    method: "POST",
    body: formData
  });

  // 🔥 업로드 후 DB 다시 불러오기
  loadRace();
}

function editRow(index) {
  let row = raceData[index];

  let newName = prompt("경주명 수정", row[8]);
  if (newName !== null) {
    row[8] = newName;
  }

  let newTime = prompt("출발시각 수정", row[9]);
  if (newTime !== null) {
    row[9] = newTime;
  }

  renderTable();
}

async function saveCell(td, value, rowIndex, colIndex) {
  const id = raceData[rowIndex][0];

  const keys = ["id","지역","순","경주일자","경주","등급","거리","편성","출전","경주명","출발시각","비고"];

  const field = keys[colIndex];

  const token = localStorage.getItem("token");
  await fetch(`https://almago-1llh.onrender.com/race/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      [field]: value
    })
  });

  raceData[rowIndex][colIndex] = value;
  td.innerText = value;
}

async function deleteRow(index) {
  const token = localStorage.getItem("token");
  const id = raceData[index][0];

  if (!confirm("삭제할까?")) return;

  await fetch(`https://almago-1llh.onrender.com/race/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  raceData.splice(index, 1);
  renderTable();
}

// =========================
// 출전표렌더링
// =========================
function renderTable() {
  const table = document.getElementById("race-table");
  table.innerHTML = "";

  raceData.forEach((r, rowIndex) => {

    const cells = r.slice(1);

    table.innerHTML += `
      <tr>
        ${cells.map((cell, colIndex) => {

          if (colIndex === 3) {
            return `
                  <td 
                        onclick="showRaceDetail('${cell}')"
                        ondblclick="editCell(this, ${rowIndex}, ${colIndex+1})"
                        style="cursor:pointer; color:blue; font-weight:bold;"
                      >
                        ${cell}
                      </td>
                    `;
                  }

          return `
            <td ondblclick="editCell(this, ${rowIndex}, ${colIndex+1})">
              ${cell || ""}
            </td>
          `;

        }).join("")}

        <td>
          <button onclick="deleteRow(${rowIndex})">🗑</button>
        </td>
      </tr>
    `;
  });
}

function editCell(td, rowIndex, colIndex) {
  const oldValue = td.innerText;

  td.innerHTML = `<input type="text" value="${oldValue}" style="width:100%">`;

  const input = td.querySelector("input");
  input.focus();

  // Enter 누르면 저장
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      saveCell(td, input.value, rowIndex, colIndex);
    }
  });

  // 포커스 벗어나도 저장
  input.addEventListener("blur", function() {
    saveCell(td, input.value, rowIndex, colIndex);
  });
}
// =========================
// 출전표상세긁어오기
// =========================
function showRaceDetail(raceNo) {
  console.log("클릭됨:", raceNo);  // 👈 이거 추가

  fetch(`https://almago-1llh.onrender.com/race-detail/${raceNo}`)
    .then(res => res.json())
    .then(data => {

      let html = `
        <table>
          <tr>
            <th>번호</th>
            <th>마명</th>
            <th>성별</th>
            <th>나이</th>
            <th>조교사</th>
          </tr>
      `;

      data.forEach(row => {
        html += `
          <tr>
            <td>${row.번호}</td>
            <td>${row.마명}</td>
            <td>${row.성별}</td>
            <td>${row.나이}</td>
            <td>${row.조교사}</td>
          </tr>
        `;
      });

      html += `</table>`;

      document.getElementById("race-detail-area").innerHTML = html;
    });
}

// =========================
// 분석관리
// =========================
async function loadAnalysisTable() {
  const token = localStorage.getItem("token");

  const res = await fetch("https://almago-1llh.onrender.com/analysis-table", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();

  const table = document.getElementById("analysis-table");
  table.innerHTML = "";

  data.forEach(row => {
    table.innerHTML += `
      <tr>
        <td>${row.지역}</td>
        <td>${row.경주}</td>
        <td>${row.경주일자}</td>

        <td><input id="star_${row.id}" value="${row.star || ''}"></td>
        <td><input id="square_${row.id}" value="${row.square || ''}"></td>
        <td><input id="empty_${row.id}" value="${row.empty || ''}"></td>
        <td><input id="up_${row.id}" value="${row.up || ''}"></td>
        <td><input id="triangle_${row.id}" value="${row.triangle || ''}"></td>
        <td><input id="dark_${row.id}" value="${row.darkhorse || ''}"></td>

        <td><input id="single_${row.id}" value="${row.single || ''}"></td>
        <td><input id="double_${row.id}" value="${row.double || ''}"></td>
        <td><input id="triple_${row.id}" value="${row.triple || ''}"></td>

        <td>
          <button onclick="saveAnalysisRow(${row.id}, '${row.지역}', ${row.경주}, '${row.경주일자}')">
            저장
          </button>
        </td>
      </tr>
    `;
  });
}

// 관리자 추가 함수
// =========================
async function addAdminPrompt() {
  const email = prompt("이메일 입력");
  if (!email) return;

  const password = prompt("비밀번호 입력");
  if (!password) return;

  const token = localStorage.getItem("token");

  const res = await fetch(
    `https://almago-1llh.onrender.com/admin/create?email=${email}&password=${password}`,
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  const data = await res.json();

  if (res.ok) {
    alert("관리자 추가 완료");
    loadAdmins();
  } else {
    alert("실패: " + JSON.stringify(data));
  }
}

async function loadAdmins() {
  const token = localStorage.getItem("token");

  const res = await fetch("https://almago-1llh.onrender.com/admin/users", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  const table = document.getElementById("user-table");
  table.innerHTML = "";

  // 🔥 관리자만 필터
  const admins = data.filter(u => u.is_admin);

  admins.forEach(u => {
    table.innerHTML += `
      <tr>
        <td>${u.id}</td>
        <td>${u.email} <span class="badge badge-admin">관리자</span></td>
        <td>${u.name || "-"}</td>

        <td>
          <span class="badge ${u.is_premium ? 'badge-premium' : 'badge-free'}">
            ${u.is_premium ? '유료' : '무료'}
          </span>
        </td>

        <td>
          <button class="btn btn-delete"
            onclick="deleteUser(${u.id})">
            삭제
          </button>
        </td>
      </tr>
    `;
  });
}

async function createDesignMenu(
    name,
    path,
    icon,
    description,
    order
){

    const token = localStorage.getItem("token");

    await fetch(
        "https://almago-1llh.onrender.com/menus",
        {

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },

        body:JSON.stringify({

            name:name,

            path:path,

            icon:icon,

            description:description,

            sort_order:Number(order)
        })
    });

    loadDesignMenus();
  
}

async function loadDesignMenus(){

    const res = await fetch(
        "https://almago-1llh.onrender.com/menus"
    );

    const data = await res.json();

    const list = document.getElementById("design-list");

    list.innerHTML = "";

    data.forEach(m => {

        list.innerHTML += `

<tr>

    <td>
        <input type="checkbox"
            ${m.is_active ? "checked" : ""}
            id="active-${m.id}">
    </td>

    <td>
        <input
            value="${m.sort_order}"
            id="order-${m.id}"
            style="width:60px">
    </td>

    <td>
        <input
            value="${m.icon}"
            id="icon-${m.id}"
            style="width:60px">
    </td>

    <td>
        <input
            value="${m.name}"
            id="name-${m.id}">
    </td>

    <td>
        <input
            value="${m.description}"
            id="desc-${m.id}">
    </td>

    <td>
        <input
            value="${m.path}"
            id="path-${m.id}">
    </td>

    <td>

        <button onclick="updateMenu(${m.id})">
            수정
        </button>

        <button onclick="deleteMenu(${m.id})">
            삭제
        </button>

    </td>

</tr>

`;
    });
}

async function addDesignMenu(){

    const name =
        document.getElementById("new-name").value;

    const icon =
        document.getElementById("new-icon").value;

    const description =
        document.getElementById("new-desc").value;

    const path =
        document.getElementById("new-path").value;

    const order =
        document.getElementById("new-order").value;

    if(!name || !path){
        alert("버튼명/링크 입력");
        return;
    }

    createDesignMenu(
        name,
        path,
        icon,
        description,
        order
    );

    document.getElementById("new-name").value = "";
    document.getElementById("new-icon").value = "";
    document.getElementById("new-desc").value = "";
    document.getElementById("new-path").value = "";
    document.getElementById("new-order").value = "";
}

async function deleteMenu(id){

    const token = localStorage.getItem("token");

    await fetch(
        "https://almago-1llh.onrender.com/menus/" + id,
        {
            method:"DELETE",

            headers:{
                "Authorization":"Bearer " + token
            }
        }
    );

    loadDesignMenus();
}  

  async function updateMenu(id){

    const token = localStorage.getItem("token");

    const body = {

        name:
            document.getElementById(`name-${id}`).value,

        path:
            document.getElementById(`path-${id}`).value,

        icon:
            document.getElementById(`icon-${id}`).value,

        description:
            document.getElementById(`desc-${id}`).value,

        sort_order:Number(
            document.getElementById(`order-${id}`).value
        ),

        is_active:
            document.getElementById(`active-${id}`).checked
    };

    await fetch(
        "https://almago-1llh.onrender.com/menus/" + id,
        {

        method:"PUT",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },

        body:JSON.stringify(body)
    });

    alert("수정완료");

    loadDesignMenus();
}

  async function adminLogin(){

    const email =
        document.getElementById("admin-email").value;

    const password =
        document.getElementById("admin-password").value;

    const res = await fetch(
        "https://almago-1llh.onrender.com/login",
        {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email,
            password
        })
    });

    const data = await res.json();

    if(!res.ok){
        alert("로그인 실패");
        return;
    }

    // 관리자만 허용
    if(
        data.role !== "admin" &&
        data.role !== "superadmin"
    ){
        alert("관리자 전용");
        return;
    }

    localStorage.setItem(
        "token",
        data.access_token
    );

    localStorage.setItem(
        "role",
        data.role
    );

    showAdminPage();
}
  
// 기본 페이지
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(
    token &&
    (role === "admin" || role === "superadmin")
){
    showAdminPage();
}
