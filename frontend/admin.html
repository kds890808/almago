.admin { display:flex; height:100vh; }

/* 사이드바 */
.sidebar {

  width:220px;
  min-width:220px;

  background:#1f2a37;
  color:white;

  padding:20px;

  flex-shrink:0;
  box-sizing:border-box;
}

.sidebar h2 { margin-bottom:20px; }

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  background:none;
  color:#cbd5e1;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover {
  background:#374151;
  color:white;
}

/* 콘텐츠 */
.content {

  flex:1;
  padding:30px;

  overflow-x:auto;
}

/* 카드 */
.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea {

  width:100%;
  height:42px;

  padding:0 12px;

  margin:8px 0;

  border:1px solid #d1d5db;
  border-radius:4px;

  box-sizing:border-box;

  font-size:14px;
}

button.main {

  background:#2563eb;
  color:white;

  width:100%;
  height:42px;

  border:none;
  border-radius:4px;

  font-size:15px;
  font-weight:bold;

  cursor:pointer;
}

/* 🔥 여기 추가 */
table {

    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.trainer-table{

    width:100%;
    border-collapse:collapse;

    table-layout:auto;
}

.trainer-table td{

    padding:12px;

    white-space:normal;
    word-break:break-word;

}

.trainer-table td:nth-child(1),
.trainer-table td:nth-child(3){

    width:140px;
    font-weight:bold;
}

.trainer-table td{

    word-break:break-word;
    overflow-wrap:break-word;
}

th{
  background:#1f2a37;
  color:white;
  padding:10px;
}

td{

padding:10px;

text-align:center;

border-bottom:1px solid #ddd;

white-space:nowrap;

}

tr:nth-child(even) {
  background: #f9fafb;
}

/* ===== 뱃지 ===== */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
}

.badge-premium {
  background: #22c55e;
  color: white;
}

.badge-free {
  background: #9ca3af;
  color: white;
}

.badge-admin {
  background: #f59e0b;
  color: white;
  margin-left: 6px;
}

/* ===== 버튼 ===== */
.btn {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin: 2px;
  transition: all 0.2s ease;
}

.btn:hover {
  transform: scale(1.05);
}

.btn:active {
  transform: scale(0.9);
}

.btn-premium {
  background: #22c55e;
  color: white;
}

.btn-admin {
  background: #3b82f6;
  color: white;
}

.btn-delete {

  color: white;
}

.stat-box{

async function togglePremium(id, currentPremium, currentAdmin) {
  const token = localStorage.getItem("token");

  const res = await fetch(`/users/${id}?is_premium=${!currentPremium}&is_admin=${currentAdmin}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (!res.ok) {
    alert("실패: " + res.status);
    return;
  }

  loadUsers();
}

// =========================

async function toggleAdmin(id, currentPremium, currentAdmin) {
  const token = localStorage.getItem("token");

  await fetch(`/users/${id}?is_premium=${currentPremium}&is_admin=${!currentAdmin}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  loadUsers();
}

async function deleteUser(id, isAdmin = false) {

  const token = localStorage.getItem("token");

  if (!confirm("진짜 삭제할까?")) return;

  await fetch(
    `/users/${id}`,
    {
      method: "DELETE",

      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  if(isAdmin){
    loadAdmins();
  }else{
    loadUsers();
  }
}

async function handleAction(button, action) {
  const originalText = button.innerText;

  button.disabled = true;
  button.innerText = "처리중...";

  try {
    await action();  // 🔥 핵심 수정
  } catch (e) {
    alert("에러 발생: " + e);
  }

  button.disabled = false;
  button.innerText = originalText;
}

async function givePoint(userId){

const point =
Number(
document.getElementById(
`point-${userId}`
).value
);

if(!point){

alert("포인트 입력");
return;

}

const token =
localStorage.getItem("token");

const res = await fetch(

`/users/${userId}/point?point=${point}`,

{
method:"PUT",

headers:{

}

}

);

const data = await res.json();

if(!res.ok){

alert(data.detail || "포인트 지급 실패");
return;

}

alert(`${point}P 지급 완료`);

loadUsers();

}

function getCountdown(date,time){

const raceDate=new Date(
`${date} ${time}`
);

const now=new Date();

const diff=
raceDate-now;

if(diff<=0){
return "종료";
}

const days=Math.floor(
diff/(1000*60*60*24)
);

const hours=Math.floor(
(diff%(1000*60*60*24))
/
(1000*60*60)
);

const mins=Math.floor(
(diff%(1000*60*60))
/
(1000*60)
);

if(days===0){
return `🔴 ${hours}시간 ${mins}분`;
}

if(days===1){
return `🟠 내일`;
}

if(days<=3){
return `🟡 ${days}일`;
}

return `🟢 ${days}일`;
}

function renderTable() {

const table =
document.getElementById(
"race-table"
);

if(!table){
return;
}

table.innerHTML="";

raceData.forEach(
(r,rowIndex)=>{

const cells = [

r[3], // 순
r[4], // 경주일자
r[5], // 경주
r[6], // 등급
r[7], // 거리
r[8], // 편성
r[9], // 출전
r[10], // 경주명
r[11], // 출발시각

getCountdown(
r[4],
r[11]
),

r[12] // 비고

];

table.innerHTML += `
<tr>

<td>
<input
type="checkbox"
class="row-check"
value="${r[0]}">
</td>

${cells.map((cell,colIndex)=>{

return `
<td ondblclick="editCell(this, ${rowIndex}, ${colIndex+1})">
${String(cell)==="NaN" ? "" : (cell || "")}
</td>
`;

}).join("")}

<td>

🗑
</button>
</td>

</tr>
`;

});

}

function editCell(td, rowIndex, colIndex) {
  const oldValue = td.innerText;

  td.innerHTML = `<input type="text" value="${oldValue}" style="width:100%">`;

  const input = td.querySelector("input");
  input.focus();

  // Enter 누르면 저장
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      saveCell(td, input.value, rowIndex, colIndex);
    }
  });

  // 포커스 벗어나도 저장
  input.addEventListener("blur", function() {
    saveCell(td, input.value, rowIndex, colIndex);
  });
}

async function showBloodAnalysis(
region,
raceNo,
raceDate
){

const date =
String(raceDate)
.replace(/\//g,"");

const res = await fetch(
`/blood-analysis-data/${region}/${raceNo}/${date}`
);

const data = await res.json();

let html = `
<table border="1"
style="
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
">

<tr>
<th>번호</th>
<th>마명</th>
<th>도시지</th>
<th>DI</th>
<th>CD</th>
<th>근친</th>
<th>AWD</th>
<th>부AWD</th>
<th>모AWD</th>
<th>모부AWD</th>
<th>주행습성</th>
<th>거리적합</th>
<th>코멘트</th>
<th>점수</th>
</tr>
`;

data.forEach(h=>{

const dosageRaw =
String(h.도시지프로필 || "")
.replace(/\s/g,"");

const dosage =
dosageRaw
.split("")
.join(" ");

const d1 = Number(dosageRaw[0] || 0);
const d2 = Number(dosageRaw[1] || 0);
const d3 = Number(dosageRaw[2] || 0);
const d4 = Number(dosageRaw[3] || 0);
const d5 = Number(dosageRaw[4] || 0);

const speedPower =
d1 + d2;

const staminaPower =
d4 + d5;

const di =
parseFloat(h.DI || 0);

const cd =
parseFloat(h.CD || 0);

const kin =
parseFloat(h.근친 || 0);

let awd =
parseInt(h.AWD);

if(isNaN(awd)){

const sire =
parseInt(h.부AWD || 0);

const dam =
parseInt(h.모AWD || 0);

const damSire =
parseInt(h.모부AWD || 0);

const values =
[sire, dam, damSire].filter(v=>v > 0);

if(values.length > 0){

awd =
Math.round(
values.reduce((a,b)=>a+b,0) / values.length
);

}else{

awd = 0;

}

}

// 주행습성
let style = "";

if(di >= 4){
style = "선행형";
}else if(di >= 2){
style = "선입형";
}else if(di >= 1){
style = "추입형";
}else{
style = "지구력형";
}

// 거리적합
let distance = "";

if(awd > 0){

if(awd >= 1800){
distance = "장거리";
}else if(awd >= 1400){
distance = "중거리";
}else{
distance = "단거리";
}

}else{

if(di >= 4 || cd >= 0.9 || speedPower > staminaPower + 3){
distance = "단거리";
}else if(di >= 2 && di < 4){
distance = "중거리";
}else{
distance = "장거리";
}

}

let comment = "";
//코멘트
if(di >= 4){

comment += "초반 스피드가 뛰어난 혈통으로 보입니다. ";

}else if(di >= 2){

comment += "선입 전개에 어울리는 균형 잡힌 혈통입니다. ";

}else if(di >= 1){

comment += "후반 추입력에 기대를 걸 수 있는 혈통입니다. ";

}else{

comment += "지구력이 강한 장거리 지향 혈통입니다. ";

}

if(cd >= 0.8){

comment += "짧은 거리에서 장점을 보일 가능성이 높습니다. ";

}else if(cd >= 0.3){

comment += "중거리에서 안정적인 능력 발휘가 기대됩니다. ";

}else{

comment += "거리가 늘어날수록 강점을 보일 수 있다. ";

}

if(kin <= 2){

comment += "혈통 구성(근친)도 무난한 편이라 부담이 적습니다. ";

}else{

comment += "혈통 집중도(근친)가 다소 높아 체크가 필요하다. ";

}

// 혈통점수 100점

let score = 0;

// DI 30점
if(di >= 2 && di <= 4){
score += 30;
}else if(di >= 1.5 && di < 2){
score += 25;
}else if(di > 4 && di <= 6){
score += 20;
}else{
score += 10;
}

// CD 20점
if(cd >= 0.3 && cd <= 0.9){
score += 20;
}else if(cd >= 0 && cd < 0.3){
score += 15;
}else{
score += 10;
}

// 근친 10점
if(kin <= 2){
score += 10;
}else if(kin <= 5){
score += 8;
}else{
score += 5;
}

// 도시지 20점
const diff =
Math.abs(speedPower - staminaPower);

if(diff <= 3){
score += 20;
}else if(diff <= 6){
score += 15;
}else{
score += 10;
}

// AWD 20점
if(awd >= 1400 && awd <= 1800){
score += 20;
}else if(awd >= 1200){
score += 15;
}else{
score += 10;
}

score =
Math.min(100, Math.round(score));
h.경주마특성 = style;
h.거리적합 = distance;
html += `
<tr>
<td>${h.번호 || "-"}</td>
<td>${h.마명 || "-"}</td>
<td>${dosage || "-"}</td>
<td>${h.DI || "-"}</td>
<td>${h.CD || "-"}</td>
<td>${h.근친 || "-"}</td>
<td>${h.AWD || "-"}</td>
<td>${h.부AWD || "-"}</td>
<td>${h.모AWD || "-"}</td>
<td>${h.모부AWD || "-"}</td>
<td>${style}</td>
<td>${distance}</td>
<td>

<textarea
id="blood-comment-${region}-${raceNo}-${h.번호}"
>${comment}</textarea>

</td>

<td>

<input
id="blood-score-${region}-${raceNo}-${h.번호}"
value="${score}"
/>

</td>
</tr>
`;

});

html += "</table>";

document.getElementById(
`blood-${region}-${raceNo}-${raceDate}`
).innerHTML = html;

}

async function saveBloodAnalysis(
region,
raceNo,
raceDate,
silent=false
){

const date =
String(raceDate)
.replace(/\//g,"");

const res =
await fetch(
`/blood-analysis-data/${region}/${raceNo}/${date}`
);

const data =
await res.json();

for(const h of data){

const comment =
document.getElementById(
`blood-comment-${region}-${raceNo}-${h.번호}`
)?.value || "";

const score =
parseInt(
document.getElementById(
`blood-score-${region}-${raceNo}-${h.번호}`
)?.value || 0
);

console.log(
"저장값",
h.번호,
comment,
score
);

// ====================
// 주행습성 계산
// ====================
let style = "";

const di =
parseFloat(h.DI || 0);

if(di >= 4){

    style = "선행형";

}else if(di >= 2){

    style = "선입형";

}else if(di >= 1){

    style = "추입형";

}else{

    style = "지구력형";

}

// ====================
// 거리적합 계산
// ====================
let distance = "";

let awd =
parseInt(h.AWD);

if(isNaN(awd)){

    const sire =
    parseInt(h.부AWD || 0);

    const dam =
    parseInt(h.모AWD || 0);

    if(sire && dam){

        awd =
        Math.round(
        (sire + dam) / 2
        );

    }else{

        awd =
        sire || dam || 0;

    }

}

if(awd >= 1800){

    distance = "장거리";

}else if(awd >= 1400){

    distance = "중거리";

}else{

    distance = "단거리";

}


console.log({
번호:h.번호,
특성:style,
거리:distance,
점수:score
});

const saveRes =
await fetch(
"/save-blood-analysis",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

지역:region,
경주:Number(raceNo),
경주일자:date,

번호:Number(h.번호),
마명:h.마명,

도시지프로필:h.도시지프로필,

DI:h.DI,
CD:h.CD,
근친:h.근친,

AWD:h.AWD,
부AWD:h.부AWD,
모AWD:h.모AWD,
모부AWD:h.모부AWD,

경주마특성:style,
거리적합:distance,

코멘트:comment,
점수:score

})
}
);

console.log(
"상태코드:",
saveRes.status
);

}

if(!silent){
  alert("혈통분석 저장 완료");

}
}

async function loadPaceAnalysisTable(){

const races =
await res.json();

document.getElementById(

);

table.innerHTML="";

const uniqueRaces=[];

races.forEach(r=>{

`${r.지역}_${r.경주}_${r.경주일자}`;

if(
!uniqueRaces.find(
x=>x.key===key
)
){

`;

});

}
